<html lang="es">
	<head>

		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
        <div id="menuToggle" class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
		<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h1>Cine<span>Central</span></h1>
    </div>
    <ul class="nav-links">
        <li><div class="contenedor ">
        <a href="/" class="">Inicio</a>
        <a href="/"><img src="/Images/icons/home.svg" class="add-icon"></a>
        </div></li>
        
        <li><div class="contenedor">
        <a href="/carameleria">Caramelería</a>
        <a href="/carameleria"><img src="/Images/icons/popcorn-svgrepo-com.svg" class="add-icon"></a>
        </div></li>
        
        <li><div class="contenedor">
        <a href="/cartelera">Carteleras</a>
        <a href="/cartelera"><img src="/Images/icons/movie-svgrepo-com.svg" class="add-icon"></a>
        </div></li>
        
        <li><div class="contenedor">
        <a href="/proximos-estrenos">Próximos estrenos</a>
        <a href="/proximos-estrenos"><img src="/Images/icons/next-svgrepo-com.svg" class="add-icon"></a>
        </div></li>
        
        <li><div class="contenedor">
        <a href="/contacto">Contacto</a>
        <a href="/contacto"><img src="/Images/icons/mail.svg" class="add-icon"></a>
        </div></li>
        
        <li><div class="contenedor">
        <a href="/login" class="login-menu-item" id="btn-login-nav">Iniciar Sesión</a>
        <a href="/login" class="login-menu-item"><img src="/Images/icons/log-in.svg" class="add-icon"></a>
        </div></li>
    </ul>
</nav>
		<main class="main-content">
			<section class="movies-section">
                <div class="section-header">
                    <h2>Contáctanos</h2>
                </div>
                
                <div class="contacto-container">
                    <p style="margin-bottom: 20px; color: #b3b3b3;">¿Tienes alguna duda, sugerencia o problema con la pagina? Llena el formulario y jamas lo leeremos.</p>
                    
                    <form action="#" method="POST" class="contacto-form">
                        <div class="form-group">
                            <label for="nombre">Nombre Completo</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ej. Victor Ojeda" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="mensaje">Mensaje</label>
                            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                        </div>
                        
                        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
                    </form>
                </div>
            </section>
		</main>
	<script src="/javascript/script.js"></script>
</body>
</html>
