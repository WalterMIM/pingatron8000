	</head>
	<body>

    <div class="sidebar-header">

    </div>
    <ul class="nav-links">

        <a href="/" class="">Inicio</a>
        <a href="/"><img src="/Images/icons/home.svg" class="add-icon"></a>
        </div></li>
        
        <li><div class="contenedor">

        <a href="/cartelera">Carteleras</a>

		<main class="main-content">
    <section class="movies-section">
        <div class="section-header">
            <h2>Próximos Estrenos</h2>
        </div>

        <div id="contenedor-admin-ops" style="margin-bottom: 20px; display: none;">
            <a href="/admin" style="display: inline-block; background-color: #e50914; color: white; padding: 12px 20px; text-decoration: none; border-radius: 4px; font-weight: bold;">+ Agregar Próximo Estreno</a>
        </div>

        <div class="movies-grid" id="contenedor-estrenos">
            <p style="color: #aaa;">Cargando próximos estrenos...</p>
        </div>
    </section>
</main>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const contenedor = document.getElementById("contenedor-estrenos");
        const contenedorAdmin = document.getElementById("contenedor-admin-ops");

        // 1. Mostrar botón si es Admin
        try {
            const resUser = await fetch('/api/usuario-actual');
            const user = await resUser.json();
            if (user.logueado && user.rol === 'admin') {
                contenedorAdmin.style.display = "block";
            }
        } catch (e) { console.error(e); }

        // 2. Cargar los estrenos de la Base de Datos
        try {
            const res = await fetch('/api/estrenos');
            const estrenos = await res.json();

            if (estrenos.length === 0) {
                contenedor.innerHTML = '<p style="color: #aaa;">No hay próximos estrenos programados por ahora.</p>';
                return;
            }

            contenedor.innerHTML = "";
            estrenos.forEach(peli => {
                const article = document.createElement("article");
                article.className = "movie-card";
                article.innerHTML = `
                    <div class="poster-container">
                        <img src="${peli.portada}" alt="${peli.titulo}">
                        <span class="tag-estreno" style="background-color: #ff9800;">PRÓXIMAMENTE</span>
                    </div>
                    <div class="movie-info">
                        <h3>${peli.titulo}</h3>
                        <p class="meta">${peli.duracion} min | ${peli.genero || 'Estreno'}</p>
                        <p style="font-size: 0.85em; color: #aaa; margin-top: 5px;">${peli.sinopsis || ''}</p>
                    </div>
                `;
                contenedor.appendChild(article);
            });
        } catch (err) {
            contenedor.innerHTML = '<p style="color: #e50914;">Error al conectar con el servidor.</p>';
        }
    });
</script>
</body>
</html>
