		<main class="main-content">
    <section class="movies-section">
       <div class="section-header">
    <h2>Cartelera</h2>
</div>

<div id="contenedor-admin-ops" style="margin-bottom: 20px; display: none;">
    <a href="/admin" class="btn-admin-add">+ Agregar Nueva Película</a>
</div>
        <div class="movies-grid-2" id="contenedor-cartelera">
            <p style="color: #aaa;">Cargando películas en cartelera...</p>
        </div>
    </section>
</main>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const contenedor = document.getElementById("contenedor-cartelera");
        const contenedorAdmin = document.getElementById("contenedor-admin-ops");

        // 🔍 VERIFICACIÓN DE ROL: Consultamos si el usuario es administrador
        try {
            const resUsuario = await fetch('/api/usuario-actual');
            const usuario = await resUsuario.json();

            if (usuario.logueado && usuario.rol === 'admin') {
                contenedorAdmin.style.display = "block"; // Hacemos visible el botón si es admin
            }
        } catch (error) {
            console.error("Error verificando el rol del usuario:", error);
        }

        // 🎬 CARGA DE PELÍCULAS (Tu lógica anterior que funciona perfecto)
        try {
            const respuesta = await fetch('/api/cartelera');
            const peliculas = await respuesta.json();

            if (peliculas.length === 0) {
                contenedor.innerHTML = '<p style="color: #aaa; grid-column: 1/-1; text-align: center;">No hay películas programadas en la cartelera por el momento.</p>';
                return;
            }

            contenedor.innerHTML = ""; 

            peliculas.forEach(peli => {
                let botonesHorarios = "";
                if (peli.funciones && peli.funciones.length > 0) {
                    peli.funciones.forEach(func => {
                        const horaCorta = func.hora_inicio.substring(0, 5);
                        botonesHorarios += `<button class="btn-hora" onclick="alert('Seleccionaste la función de las ${horaCorta} para ${peli.titulo}')">${horaCorta}</button>`;
                    });
                } else {
                    botonesHorarios = "<span style='color: #888; font-size: 0.85em;'>Sin funciones hoy</span>";
                }

                const article = document.createElement("article");
                article.className = "movie-card";
                article.innerHTML = `
                    <div class="poster-container">
                        <img src="${peli.portada}" alt="${peli.titulo}">
                    </div>
                    <div class="movie-info">
                        <h3>${peli.titulo}</h3>
                        <p class="meta">${peli.duracion} min | ${peli.genero || 'General'}</p>
                        <p style="font-size: 0.85em; color: #aaa; margin: 5px 0;">${peli.sinopsis || ''}</p>
                        <div class="contenedor-horarios" style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                            ${botonesHorarios}
                        </div>
                    </div>
                `;
                contenedor.appendChild(article);
            });

        } catch (error) {
            console.error("❌ Error cargando cartelera:", error);
            contenedor.innerHTML = '<p style="color: #e50914; grid-column: 1/-1; text-align: center;">Error al conectar con la base de datos.</p>';
        }
    });
</script>
