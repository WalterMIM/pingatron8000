<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CineCentral - Caramelería</title>
        <link rel="stylesheet" href="/css/estilos.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="Images/shortico.png" type="image/x-icon">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="menuToggle" class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Cine<span>Central</span></h1>
            </div>
            <ul class="nav-links">
                <li><div class="contenedor">
                <a href="/">Inicio</a>
                <a href="/"><img src="/Images/icons/home.svg" class="add-icon"></a>
                </div></li>
                
                <li><div class="contenedor">
                <a href="/carameleria">Caramelería</a>
                <a href="/carameleria"><img src="/Images/icons/popcorn-svgrepo-com.svg" class="add-icon"></a>
                </div></li>
                
                <li><div class="contenedor">
                <a href="/cartelera">Carteleras</a>
                <a href="/cartelera"><img src="/Images/icons/movie-svgrepo-com.svg" class="add-icon"></a>
                </div></li>
                
                <li><div class="contenedor">
                <a href="/proximos-estrenos">Próximos estrenos</a>
                <a href="/proximos-estrenos"><img src="/Images/icons/next-svgrepo-com.svg" class="add-icon"></a>
                </div></li>
                
                <li><div class="contenedor">
                <a href="/contacto">Contacto</a>
                <a href="/contacto"><img src="/Images/icons/mail.svg" class="add-icon"></a>
                </div></li>
                
                <li><div class="contenedor">
                <a href="/login" class="login-menu-item" id="btn-login-nav">Iniciar Sesión</a>
                <a href="/login" class="login-menu-item"><img src="/Images/icons/log-in.svg" class="add-icon"></a>
                </div></li>
            </ul>
        </nav>
        
      <main class="main-content">
    <div id="admin-combos-control" style="display: none; margin-bottom: 25px; padding: 15px; background: #1c1c1c; border-radius: 6px; border: 1px solid #333;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <span style="font-weight: bold; color: #fff;">Panel de Gestión de Almacén</span>
            <a href="/admin" style="background-color: #e50914; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; font-size: 0.85rem;">
                ⚙️ Ir a Agregar Combo / Películas
            </a>
        </div>
        
        <div id="lista-eliminacion-admin" style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #333; padding-top: 12px;">
            <p style="color: #aaa; font-size: 0.85rem; margin: 0;">Cargando opciones de eliminación...</p>
        </div>
    </div>

    <div class="candy-grid" id="contenedor-combos">
        <p style="color: #aaa; padding: 20px;">Cargando productos de caramelería...</p>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const contenedorCombos = document.getElementById('contenedor-combos');
        const listaEliminacionAdmin = document.getElementById('lista-eliminacion-admin');
        let esAdmin = false;

        // 1. Verificar Sesión y Rol
        try {
            const resUser = await fetch('/api/usuario-actual');
            const dataUser = await resUser.json();
            
            const btnLoginNav = document.getElementById('btn-login-nav');
            if (dataUser.logueado && btnLoginNav) {
                btnLoginNav.textContent = 'Cerrar Sesión';
                btnLoginNav.href = '/logout';
                btnLoginNav.style.color = '#e50914';
            }

            if (dataUser.logueado && dataUser.rol === 'admin') {
                esAdmin = true;
                document.getElementById('admin-combos-control').style.display = 'block';
            }
        } catch (err) { console.error(err); }

        // 2. Carga Dinámica de los Combos
        try {
            const respuesta = await fetch('/api/combos');
            const combos = await respuesta.json();

            if (combos.length === 0) {
                contenedorCombos.innerHTML = '<p style="color: #aaa; padding: 20px;">No hay productos disponibles.</p>';
                if(esAdmin) listaEliminacionAdmin.innerHTML = '<p style="color: #aaa;">No hay elementos para eliminar.</p>';
                return;
            }

            contenedorCombos.innerHTML = "";
            if(esAdmin) listaEliminacionAdmin.innerHTML = ""; // Limpiar panel de borrado

            combos.forEach(combo => {
                // Evaluar si tiene stock cero
                const sinStock = parseInt(combo.stock) <= 0;

                // --- RENDER PARA EL PÚBLICO ---
                const article = document.createElement('article');
                article.className = 'candy-card';
                // Si no hay disponibilidad, aplicamos opacidad con CSS inline
                if (sinStock) {
                    article.style.opacity = "0.4";
                    article.style.filter = "grayscale(60%)";
                }

                article.innerHTML = `
                    <div class="candy-poster" style="position: relative;">
                        <img src="${combo.imagen}" alt="${combo.nombre}">
                        ${sinStock ? `<span style="position: absolute; top: 10px; left: 10px; background: #e50914; color: white; padding: 4px 8px; font-size: 0.75rem; font-weight: bold; border-radius: 3px; text-transform: uppercase;">No Disponible</span>` : ''}
                    </div>
                    <div class="candy-info">
                        <h3>${combo.nombre}</h3>
                        <p class="descripcion" style="color: #aaa; font-size: 0.85rem; margin: 5px 0;">${combo.descripcion}</p>
                        <p class="precio">$${parseFloat(combo.precio).toFixed(2)}</p>
                    </div>
                `;
                contenedorCombos.appendChild(article);

                // --- RENDER PANEL DE ELIMINACIÓN (SOLO ADMIN) ---
                if (esAdmin) {
                    const itemBorrar = document.createElement('div');
                    itemBorrar.style.display = 'flex';
                    itemBorrar.style.justify = 'between';
                    itemBorrar.style.alignItems = 'center';
                    itemBorrar.style.background = '#222';
                    itemBorrar.style.padding = '8px 12px';
                    itemBorrar.style.borderRadius = '4px';
                    itemBorrar.style.justifyContent = 'space-between';

                    itemBorrar.innerHTML = `
                        <span style="font-size: 0.9rem; color: #eee;">❌ ${combo.nombre} (Stock: ${combo.stock})</span>
                        <form action="/api/admin/eliminar-combo" method="POST" onsubmit="return confirmarEliminacion('${combo.nombre}')">
                            <input type="hidden" name="combo_id" value="${combo.id}">
                            <button type="submit" style="background: #e50914; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 0.8rem; font-weight: bold;">
                                Eliminar
                            </button>
                        </form>
                    `;
                    listaEliminacionAdmin.appendChild(itemBorrar);
                }
            });

        } catch (error) {
            console.error(error);
            contenedorCombos.innerHTML = '<p style="color: #e50914; padding: 20px;">Error al conectar con la base de datos.</p>';
        }
    });

    // Función nativa para confirmar antes de enviar el formulario de borrado
    function confirmarEliminacion(nombreCombo) {
        return confirm(`¿Estás completamente seguro de que deseas eliminar el "${nombreCombo}" del inventario? Esta acción no se puede deshacer.`);
    }
</script>
    </body>
</html>
